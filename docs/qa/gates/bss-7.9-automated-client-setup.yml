      AC-2 PASS: token-generator.ts L22-165. generatePrimitive() L31-61 maps approved palette colors to DTCG tokens with $value (hex) and $type ('color'), plus typography tokens (fontFamily, dimension, number). generateSemantic() L72-106 creates brand/text/surface semantic mappings. generateComponent() L117-150 creates button/text/card component tokens. client-setup-pipeline.ts L167-189 Step 3 creates TokenFileGenerator, generates all 3, uploads to R2 via buildTokenR2Key(clientId, 'primitive'|'semantic'|'component') (setup-types.ts L194-196 returns `brand-assets/{clientId}/tokens/{type}.json`).
