# Netlify configuration for Brand System Service
# Static-first deployment per ADR-001, ADR-008

[build]
  command = "pnpm build"
  publish = "output"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9.15.4"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:"

# Long-lived cache for assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Custom domain setup (per ADR-008)
# For each client, configure CNAME:
#   brand.client-domain.com -> client-brand.netlify.app
# Then add custom domain in Netlify dashboard:
#   Site settings > Domain management > Add custom domain
