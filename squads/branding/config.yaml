    - brand-identity-checklist.md
    - social-media-checklist.md
    - web-design-checklist.md

  templates: []
  tools: []
  scripts: []

# ============================================
# HANDOFF MATRIX
# ============================================
handoffs:
  brand-strategist:
    routes_to: [token-engineer, ai-orchestrator, creative-producer, brand-book-builder]
    receives_from: ["orchestrator", "client"]

  token-engineer:
    routes_to: [brand-book-builder, web-builder, figma-component-builder]
    receives_from: [brand-strategist]
    escalates_to: [brand-strategist]

  ai-orchestrator:
    routes_to: [creative-producer, web-builder]
    receives_from: [brand-strategist]
    escalates_to: [brand-strategist]

  brand-book-builder:
    routes_to: [qa-reviewer]
    receives_from: [brand-strategist, token-engineer]
    escalates_to: [brand-strategist]

  creative-producer:
    routes_to: [qa-reviewer]
    receives_from: [ai-orchestrator, brand-strategist]
    escalates_to: [brand-strategist]

  web-builder:
    routes_to: [qa-reviewer, analytics-specialist]
    receives_from: [brand-strategist, ai-orchestrator, token-engineer]
    escalates_to: [brand-strategist]

  qa-reviewer:
    receives_from: [brand-book-builder, creative-producer, web-builder, figma-component-builder]
    escalates_to: [brand-strategist]
    note: "Final gate -- reviews all deliverables before client delivery"

  operations-coordinator:
    routes_to: [qa-reviewer]
    receives_from: [brand-strategist]
    escalates_to: [brand-strategist]

  analytics-specialist:
    receives_from: [web-builder, operations-coordinator]
    escalates_to: [brand-strategist]

  figma-component-builder:
    routes_to: [qa-reviewer]
    receives_from: [token-engineer, brand-strategist]
    escalates_to: [brand-strategist]

# ============================================
# CONFIG
# ============================================
config:
  extends: extend
  coding-standards: config/coding-standards.md
  tech-stack: config/tech-stack.md

# ============================================
# DEPENDENCIES
# ============================================
dependencies:
  node:
    - style-dictionary@^4.0.0
    - sharp@^0.33.0
    - "@vercel/og@^0.6.0"  # Satori
    - puppeteer@^22.0.0
  python: []
  squads: []
  integrations:
    - cloudflare-r2
    - clickup
    - figma
    - vercel
    - netlify
    # analytics-specialist integrations
    - google-analytics
    - google-tag-manager
    - meta-business
    - google-ads
    - google-search-console

# ============================================
# PRD TRACEABILITY
# ============================================
prd_refs:
  document: docs/prd-brand-system-service.md
  version: "1.2"
  epics_covered:
    - EPIC-BSS-2  # Design Tokens & Brand Book
    - EPIC-BSS-3  # AI Pipeline
    - EPIC-BSS-4  # Creative Production
    - EPIC-BSS-5  # Landing Pages & Sites
    - EPIC-BSS-6  # Figma Component Library (NEW - figma-component-builder)
    - EPIC-BSS-7  # Client Onboarding & Operations (operations-coordinator)
    - EPIC-BSS-8  # QA Pipeline
    - EPIC-BSS-9  # Analytics & Tracking (NEW - analytics-specialist)
    - EPIC-BSS-10 # Validation Program (NEW - operations-coordinator)

