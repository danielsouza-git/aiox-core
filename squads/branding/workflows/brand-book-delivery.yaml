# Brand Book Delivery Flow
# Generate and deliver brand book in 3 formats

name: brand-book-delivery
version: 1.0.0
description: "Generate and deliver brand book in 3 formats (online, PDF, local package)"

trigger:
  manual: true
  command: "*run-workflow brand-book-delivery"

prerequisites:
  - workflow: brand-discovery-flow
    artifacts:
      - tokens.json
      - voice_guide.md
      - manifesto.md
      - moodboard_urls[]
      - brand_profile

steps:
  # ============================================
  # PDL Steps (conditional on feature flag)
  # These run BEFORE brand book generation to
  # provide layout tokens and structural guidance.
  # When PDL is disabled, they are skipped and
  # the generate step uses default layout
  # (BOLD-STRUCTURED, backward compatible).
  # ============================================

  - id: visual-reference-research
    name: Visual Reference Research (PDL)
    agent: competitive-analyst
    feature_flag: bss.personalityDrivenLayouts.enabled
    description: "Research 5-10 reference websites matching the brand's archetype and personality. Delegates to R-I squad's competitive-analyst (Cyrus) or AIOX @analyst for archetype-driven visual research."
    inputs:
      - brand_profile
      - industry
    outputs:
      - visual-references.md
    notes: |
      This step bridges to the research-intelligence squad.
      The brand-strategist (Stella) provides the brand profile
      with archetypes and personality traits. The actual research
      is delegated to the R-I squad's visual-reference-research
      task via cross-squad handoff.

  - id: layout-brief
    name: Layout Brief Generation (PDL)
    agent: architect
    feature_flag: bss.personalityDrivenLayouts.enabled
    depends_on: [visual-reference-research]
    description: "Resolve layout family via @bss/layout-engine, then synthesize visual references + brand profile into a layout-brief.md with structural recommendations for all 7 layout dimensions."
    inputs:
      - brand_profile
      - visual-references.md
    outputs:
      - layout-brief.md
      - layout.json
    notes: |
      Two sub-steps:
      1. Layout resolution: Run @bss/layout-engine resolver
         (archetypes + personality -> layout family + tokens).
         Pure computation, <10ms.
      2. Brief synthesis: Combine resolved family, visual
         reference patterns, and brand personality into
         actionable structural recommendations.
      The layout-brief.md and layout.json (W3C DTCG tokens)
      are passed to the generate step as additional inputs.

  # ============================================
  # Core Delivery Steps
  # ============================================

  - id: generate
    name: Generate Brand Book
    agent: brand-book-builder
    task: brand-book-generate.md
    depends_on: [layout-brief]
    depends_on_mode: optional
    inputs:
      - tokens.json
      - voice_guide.md
      - manifesto.md
      - moodboard_urls[]
      - assets
      # PDL inputs (optional, only present when PDL enabled)
      - layout-brief.md
      - layout.json
    outputs:
      - brand-book/

  - id: pdf
    name: Export PDF
    agent: brand-book-builder
    task: brand-book-pdf.md
    depends_on: [generate]
    inputs:
      - brand-book/
    outputs:
      - brand-book.pdf

  - id: package
    name: Export Local Package
    agent: brand-book-builder
    task: brand-book-package.md
    depends_on: [generate]
    inputs:
      - brand-book/
    outputs:
      - brand-book.zip

  - id: review
    name: Quality Review
    agent: qa-reviewer
    task: review-deliverable.md
    depends_on: [generate, pdf, package]
    inputs:
      - brand-book/
      - brand-book.pdf
      - brand-book.zip
    outputs:
      - review_report
      - verdict

  - id: approval
    name: Final Approval
    agent: qa-reviewer
    task: final-approval.md
    depends_on: [review]
    condition: "review.verdict != 'FAIL'"
    inputs:
      - review_report
    outputs:
      - approval_status

  - id: deploy
    name: Deploy Brand Book
    agent: brand-book-builder
    task: brand-book-deploy.md
    depends_on: [approval]
    condition: "approval_status == 'APPROVED'"
    inputs:
      - brand-book/
      - host_config
    outputs:
      - deployed_url

artifacts:
  - brand-book/ (static HTML)
  - brand-book.pdf (50-100 pages)
  - brand-book.zip (local package)
  - deployed_url
  # PDL artifacts (only present when feature flag enabled)
  - visual-references.md (PDL)
  - layout-brief.md (PDL)
  - layout.json (PDL, W3C DTCG layout tokens)

estimated_duration: "1-2 hours"
