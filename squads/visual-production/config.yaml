# Visual Production Squad - Professional Visual Asset Production
# Generated by @dev (Dex)

name: visual-production
version: 1.0.0
display_name: Visual Production Squad
description: "Professional visual asset production at scale: art direction, AI image generation, photo editing, motion design, and asset management"
author: AIOX Framework
license: MIT
slashPrefix: visual-production
domain: visual-assets

aiox:
  minVersion: "2.1.0"
  type: squad

# ============================================
# AGENTS
# ============================================
agents:
  - id: art-director
    name: Vincent
    file: agents/art-director.md

  - id: ai-image-specialist
    name: Iris
    file: agents/ai-image-specialist.md

  - id: photo-editor
    name: Phoebe
    file: agents/photo-editor.md

  - id: motion-designer
    name: Max
    file: agents/motion-designer.md

  - id: asset-manager
    name: Archer
    file: agents/asset-manager.md


# ============================================
# COMPONENTS
# ============================================
components:
  tasks:
    # art-director
    - visual-direction.md
    - style-guide-enforce.md
    - brand-visual-audit.md
    # ai-image-specialist
    - ai-image-generate.md
    - ai-prompt-engineer.md
    - batch-image-generate.md
    # photo-editor
    - photo-retouch.md
    - photo-composite.md
    - image-optimize.md
    # motion-designer
    - motion-create.md
    - lottie-animate.md
    - micro-interaction.md
    # asset-manager
    - asset-organize.md
    - asset-export.md
    - cdn-optimize.md

  workflows:
    - visual-production-flow.yaml
    - asset-pipeline-flow.yaml
    - ai-image-pipeline-flow.yaml

  checklists:
    - visual-quality-checklist.md
    - brand-consistency-checklist.md
    - asset-delivery-checklist.md
    - motion-quality-checklist.md

  templates: []
  tools: []
  scripts: []

# ============================================
# CONFIG
# ============================================
config:
  extends: extend
  coding-standards: config/coding-standards.md
  tech-stack: config/tech-stack.md
  image-specs: config/image-specs.md

# ============================================
# DEPENDENCIES
# ============================================
dependencies:
  node:
    - sharp@^0.33.0
    - ffmpeg-static@^5.2.0
    - lottie-web@^5.12.0
  python: []
  squads:
    - branding
    - design-system
  integrations:
    - flux-api
    - dall-e-api
    - sharp
    - ffmpeg
    - lottie
    - cloudflare-r2

# ============================================
# VISUAL SPECS
# ============================================
image_standards:
  formats:
    web:
      primary: webp
      fallback: [avif, png, jpg]
      quality: 85
    social:
      format: png
      quality: 95
    print:
      format: tiff
      color_space: CMYK
      dpi: 300

  sizes:
    hero: "1920x1080"
    social_square: "1080x1080"
    social_story: "1080x1920"
    thumbnail: "640x360"
    og_image: "1200x630"

  motion:
    fps: 60
    lottie_max_size: "150KB"
    gif_max_size: "5MB"
    video_codec: h264

# ============================================
# INTEGRATION WITH OTHER SQUADS
# ============================================
integration:
  receives_from_branding:
    - brand_profile
    - palette
    - moodboard
    - visual_direction

  receives_from_design_system:
    - component_specs
    - icon_system

  provides_to_branding:
    - hero_images
    - social_assets
    - web_assets
    - motion_assets

  provides_to_copy:
    - carousel_images
    - thumbnail_images
    - ad_creatives

tags:
  - visual-production
  - image-generation
  - photo-editing
  - motion-design
  - asset-management
  - ai-images
  - cdn
