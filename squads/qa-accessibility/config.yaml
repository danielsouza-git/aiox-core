# QA Accessibility Squad - Design QA & Compliance
# Generated by @dev (Dex)

name: qa-accessibility
version: 1.0.0
display_name: QA Accessibility Squad
description: "Specialized quality assurance for design systems and brand outputs: visual QA, accessibility testing, brand compliance verification, and performance auditing"
author: AIOX Framework
license: MIT
slashPrefix: qa-accessibility
domain: design-qa

aiox:
  minVersion: "2.1.0"
  type: squad

# ============================================
# AGENTS
# ============================================
agents:
  - id: visual-qa
    name: Vega
    file: agents/visual-qa.md

  - id: a11y-tester
    name: Ally
    file: agents/a11y-tester.md

  - id: brand-compliance
    name: Barrett
    file: agents/brand-compliance.md

  - id: performance-auditor
    name: Percy
    file: agents/performance-auditor.md


# ============================================
# COMPONENTS
# ============================================
components:
  tasks:
    # visual-qa
    - visual-review.md
    - cross-browser-test.md
    - responsive-test.md
    - screenshot-compare.md
    - layout-differentiation-check.md  # PDL: cross-brand differentiation (Gap QA-2)
    # a11y-tester
    - wcag-test.md
    - screen-reader-test.md
    - keyboard-nav-test.md
    - color-contrast-test.md
    # brand-compliance
    - brand-compliance-check.md
    - logo-usage-verify.md
    - palette-compliance.md
    - typography-compliance.md
    - manifest-validate.md
    - layout-personality-score.md  # PDL: personality expression scoring (Gap QA-1)
    # performance-auditor
    - lighthouse-audit.md
    - core-web-vitals.md
    - asset-size-audit.md
    - next-build-validate.md
    - static-export-validate.md

  workflows:
    - qa-pipeline-flow.yaml
    - a11y-certification-flow.yaml
    - brand-compliance-flow.yaml

  checklists:
    - visual-qa-checklist.md
    - a11y-wcag-checklist.md
    - brand-compliance-checklist.md
    - performance-checklist.md

  templates: []
  tools: []
  scripts: []

# ============================================
# CONFIG
# ============================================
config:
  extends: extend
  coding-standards: config/coding-standards.md
  tech-stack: config/tech-stack.md
  testing-standards: config/testing-standards.md

# ============================================
# DEPENDENCIES
# ============================================
dependencies:
  node: []
  python: []
  squads:
    - branding
    - design-system
    - visual-production
  integrations:
    - playwright
    - lighthouse
    - axe-core
    - percy

# ============================================
# INTEGRATION
# ============================================
integration:
  receives_from_branding:
    - brand_guidelines
    - palette
    - typography
    - logo_rules
  receives_from_design_system:
    - component_library
    - token_specs
  receives_from_visual_production:
    - visual_assets
    - motion_assets
  provides_to_all:
    - qa_reports
    - compliance_scores
    - a11y_certificates
    - performance_reports

tags:
  - quality-assurance
  - accessibility
  - visual-qa
  - brand-compliance
  - performance
  - wcag
  - design-qa
