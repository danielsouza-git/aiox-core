# ===============================================================================
# Squad: Auditoria -- Structural Auditing
# Domain: Auditoria Estrutural de Squads
# Created: 2026-03-29
# Version: 1.0.0
# ===============================================================================

squad:
  name: auditoria
  display_name: "Auditoria Squad -- Structural Auditing"
  version: "1.0.0"
  domain: "Auditoria Estrutural de Squads"
  description: |
    Squad independente responsavel por auditar a ESTRUTURA de todos os outros squads:
    completude de agentes e tasks, cobertura de funcoes de negocio, correcao de delegacoes,
    deteccao de overlaps entre squads e conformidade de quality gates.
    NAO audita processos (isso e do OPS) -- audita se os squads estao completos,
    corretos e sem lacunas.

  philosophy: |
    "O que nao e auditado, nao e confiavel."
    Auditoria independente garante que a estrutura de squads permanece integra,
    completa e sem duplicacoes nao-intencionais. Cada squad deve ter todos os agentes
    registrados, todas as tasks existentes, todas as secoes obrigatorias presentes
    e quality gates configurados corretamente.

  keywords:
    - auditoria
    - completude
    - cobertura
    - delegacao
    - overlap
    - quality-gates
    - validacao-estrutural
    - independencia

  entry_agent: auditoria-head
  created_by: "dex-builder"
  created_at: "2026-03-29"

# -------------------------------------------------------------------------------
# INDEPENDENCE DECLARATION
# -------------------------------------------------------------------------------
#
# O Squad Auditoria opera de forma INDEPENDENTE:
# - NAO reporta a nenhum outro squad
# - Tem acesso de LEITURA a todos os squads (config.yaml, agents/, tasks/)
# - Pode ser acionado periodicamente ou sob demanda
# - Seus findings sao reportados diretamente aos Builders/CEO
# - Escopo: audita ESTRUTURA (agentes, tasks, cobertura, completude)
# - NAO audita PROCESSOS (isso e responsabilidade do OPS)
#
# Squads auditados:
# - 7 squads tecnicos: claude-code-mastery, branding, design-system, copy,
#   visual-production, qa-accessibility, brand-pipeline, research-intelligence
# - 6 squads de negocio: ops, vendas, administracao, produto, customer-success,
#   marketing
# - Qualquer squad futuro adicionado a squads/
#
# Domain Auditors (14 auditors housed IN this squad for structural independence):
# Business squads (7):
# - ops-domain-auditor -- audits squads/ops/
# - vendas-domain-auditor -- audits squads/vendas/
# - admin-domain-auditor -- audits squads/administracao/
# - produto-domain-auditor -- audits squads/produto/
# - cs-domain-auditor -- audits squads/customer-success/
# - marketing-domain-auditor -- audits squads/marketing/
# - orchestration-domain-auditor -- audits squads/orchestration/
# Technical squads (7):
# - branding-domain-auditor -- audits squads/branding/
# - copy-domain-auditor -- audits squads/copy/
# - ds-domain-auditor -- audits squads/design-system/
# - qa-meta-domain-auditor -- audits squads/qa-accessibility/
# - vp-domain-auditor -- audits squads/visual-production/
# - bp-domain-auditor -- audits squads/brand-pipeline/
# - ri-domain-auditor -- audits squads/research-intelligence/
# All report DIRECTLY to auditoria-head. All live in this squad, NOT in domain squads.
# -------------------------------------------------------------------------------

# -------------------------------------------------------------------------------
# TIER ARCHITECTURE
# -------------------------------------------------------------------------------

tiers:
  tier_0:
    name: "Coordenacao de Auditoria"
    agents:
      - auditoria-head
    purpose: "Comissiona auditorias, revisa relatorios, escala findings, acompanha remediacoes"

  tier_1:
    name: "Auditoria de Estrutura"
    agents:
      - squad-auditor
    purpose: "Valida completude estrutural de cada squad e conformidade de quality gates"

  tier_2:
    name: "Analise e Alinhamento"
    agents:
      - coverage-analyst
      - alignment-checker
    purpose: "Analise de cobertura, deteccao de overlaps e validacao de delegacoes"

  tier_3:
    name: "Domain Auditors"
    agents:
      # Business squads (7)
      - ops-domain-auditor
      - vendas-domain-auditor
      - admin-domain-auditor
      - produto-domain-auditor
      - cs-domain-auditor
      - marketing-domain-auditor
      - orchestration-domain-auditor
      # Technical squads (7)
      - branding-domain-auditor
      - copy-domain-auditor
      - ds-domain-auditor
      - qa-meta-domain-auditor
      - vp-domain-auditor
      - bp-domain-auditor
      - ri-domain-auditor
    purpose: "Auditores especializados por dominio -- cada um conhece profundamente o squad que audita e reporta findings ao auditoria-head"

# -------------------------------------------------------------------------------
# AGENT REGISTRY
# -------------------------------------------------------------------------------

agents:
  auditoria-head:
    file: agents/auditoria-head.md
    tier: 0
    focus: "Comissiona auditorias, consolida findings, escala para Builders/CEO"

  squad-auditor:
    file: agents/squad-auditor.md
    tier: 1
    focus: "Completude estrutural (agentes, tasks, secoes) e conformidade de quality gates"

  coverage-analyst:
    file: agents/coverage-analyst.md
    tier: 2
    focus: "Cobertura de funcoes de negocio e deteccao de overlap entre squads"

  alignment-checker:
    file: agents/alignment-checker.md
