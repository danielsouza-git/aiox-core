# -------------------------------------------------------------------------------
# CROSS-CUTTING CONCERNS
# -------------------------------------------------------------------------------

cross_cutting:
  independence:
    description: "Auditoria opera independente de todos os squads"
    access: "Leitura a todos os squads em squads/"
    reports_to: "Builders / CEO (direto)"
    scope: "ESTRUTURA (agentes, tasks, cobertura, completude) -- NAO processos"

  scope_distinction:
    description: "Diferenca clara entre Auditoria e OPS"
    auditoria: "Audita se squads estao COMPLETOS e CORRETOS (estrutura)"
    ops: "Audita se PROCESSOS funcionam corretamente (execucao)"

  tools_ecosystem:
    description: "Ferramentas utilizadas pelo squad"
    tools:
      - Notion
      - Sheets
      - Markdown

  quality_standards:
    default_threshold: 70
    description: "Cada auditoria gera um relatorio com score de conformidade"

# -------------------------------------------------------------------------------
# AUDIT WORKFLOW
# -------------------------------------------------------------------------------

audit_workflow:
  description: |
    Fluxo de auditoria nao e sequencial com gates (diferente do OPS).
    Os 3 agentes especializados podem trabalhar em paralelo.
    O Alignment Checker consolida TODOS os outputs no relatorio final.

  stages:
    - stage: 1
      agent: squad-auditor
      tasks: [squad-completeness-audit, quality-gate-compliance-check]
      description: "Valida estrutura e quality gates de cada squad"

    - stage: 2
      agent: coverage-analyst
      tasks: [task-coverage-analysis, cross-squad-overlap-detection]
      description: "Mapeia cobertura e detecta overlaps"

    - stage: 3
      agent: alignment-checker
      tasks: [agent-delegation-validation, audit-report]
      description: "Valida delegacoes e consolida relatorio final"

    - stage: 4
      agent: "*-domain-auditor"
      tasks: [domain-audit]
      description: "Auditoria de dominio por especialistas internos (14 domain auditors em paralelo)"
      parallel: true
      note: "Cada domain auditor executa a task domain-audit no squad que audita (campo audits:)"

  final_output: "Relatorio consolidado de auditoria com severidade e acoes recomendadas"
