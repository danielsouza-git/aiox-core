    - branding  # Can receive brand voice from branding squad
  integrations:
    - claude-api
    - gpt-4o
    - clickup

# ============================================
# COPY FRAMEWORKS
# ============================================
frameworks:
  conversion:
    - AIDA: "Attention, Interest, Desire, Action"
    - PAS: "Problem, Agitation, Solution"
    - PASTOR: "Problem, Amplify, Story, Transformation, Offer, Response"
    - BAB: "Before, After, Bridge"
    - 4Ps: "Promise, Picture, Proof, Push"

  content:
    - HCEA: "Hook, Context, Entrega, Action"
    - StoryBrand: "Hero, Problem, Guide, Plan, Action, Success, Failure"
    - QUEST: "Qualify, Understand, Educate, Stimulate, Transition"

  email:
    - AIDA: "Standard conversion"
    - 1-2-3: "One idea, Two benefits, Three proof points"
    - Star-Chain-Hook: "Attention, Logic chain, Call to action"

# ============================================
# INTEGRATION WITH BRANDING SQUAD
# ============================================
branding_integration:
  receives_from_branding:
    - brand_profile
    - voice_guide
    - vocabulary_bank
    - forbidden_words
    - tone_spectrum

  provides_to_branding:
    - landing_page_copy
    - social_media_copy
    - email_copy
    - ad_copy

tags:
