# Research Intelligence Squad - Brand Intelligence & Market Research
# Generated by @dev (Dex)

name: research-intelligence
version: 1.0.0
display_name: Research Intelligence Squad
description: "Brand intelligence and market research: competitive analysis, market trends, audience research, and brand perception audits"
author: AIOX Framework
license: MIT
slashPrefix: research-intelligence
domain: brand-research

aiox:
  minVersion: "2.1.0"
  type: squad

# ============================================
# AGENTS
# ============================================
agents:
  - id: market-researcher
    name: Maya
    file: agents/market-researcher.md

  - id: competitive-analyst
    name: Cyrus
    file: agents/competitive-analyst.md

  - id: brand-auditor
    name: Blake
    file: agents/brand-auditor.md

  - id: trend-spotter
    name: Tessa
    file: agents/trend-spotter.md

# ============================================
# COMPONENTS
# ============================================
components:
  tasks:
    # market-researcher
    - market-research.md
    - audience-analysis.md
    - industry-report.md
    # competitive-analyst
    - competitive-audit.md
    - visual-benchmark.md
    - positioning-map.md
    # brand-auditor
    - brand-perception-audit.md
    - touchpoint-audit.md
    - consistency-score.md
    # trend-spotter
    - trend-report.md
    - color-forecast.md
    - typography-trends.md

  workflows:
    - research-pipeline-flow.yaml
    - competitive-intelligence-flow.yaml
    - brand-health-check-flow.yaml

  checklists:
    - research-quality-checklist.md
    - competitive-audit-checklist.md
    - brand-health-checklist.md

  templates: []
  tools: []
  scripts: []

# ============================================
# CONFIG
# ============================================
config:
  extends: extend
  coding-standards: config/coding-standards.md
  tech-stack: config/tech-stack.md
  research-sources: config/research-sources.md

# ============================================
# DEPENDENCIES
# ============================================
dependencies:
  node: []
  python: []
  squads:
    - branding  # Receives brand profile and provides research insights
  integrations:
    - exa-search
    - apify
    - claude-api

# ============================================
# INTEGRATION WITH BRANDING & COPY SQUADS
# ============================================
integration:
  receives_from_branding:
    - brand_profile
    - competitor_urls
    - industry

  provides_to_branding:
    - market_insights
    - competitive_analysis
    - trend_data
    - audience_personas

  provides_to_copy:
    - audience_language
    - pain_points
    - competitor_messaging

tags:
  - research
  - intelligence
  - competitive-analysis
  - market-trends
  - brand-audit
  - audience-research
