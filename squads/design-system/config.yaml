# Methodology: Atomic Design (Brad Frost)

name: design-system
version: 1.0.0
display_name: Design System Squad
description: "Transform design tokens into reusable component libraries. Bridge between brand identity (tokens) and implementation (components). Atomic Design methodology."
author: AIOX Framework
license: MIT
slashPrefix: design-system
domain: design-systems

aiox:
  minVersion: "2.1.0"
  type: squad

# ============================================
# AGENTS
# ============================================
agents:
  - id: ds-architect
    name: Atlas
    file: agents/ds-architect.md

  - id: token-transformer
    name: Tara
    file: agents/token-transformer.md

  - id: component-builder
    name: Cole
    file: agents/component-builder.md

  - id: a11y-auditor
    name: Asha
    file: agents/a11y-auditor.md

  - id: ds-documenter
    name: Doris
    file: agents/ds-documenter.md

  - id: migration-planner
    name: Miles
    file: agents/migration-planner.md


# ============================================
# COMPONENTS
# ============================================
components:
  tasks:
    # ds-architect
    - atomic-audit.md
    - pattern-extract.md
    # token-transformer
    - token-transform.md
    - theme-create.md
    # component-builder
    - component-build.md
    - component-variants.md
    - component-test.md
    # a11y-auditor
    - a11y-audit.md
    - a11y-remediate.md
    # ds-documenter
    - ds-document.md
    - usage-examples.md
    # migration-planner
    - migration-plan.md

  workflows:
    - design-system-build-flow.yaml
    - component-library-flow.yaml
    - token-pipeline-flow.yaml

  checklists:
    - component-quality-checklist.md
    - a11y-wcag-checklist.md
    - token-quality-checklist.md
    - ds-review-checklist.md

  templates: []
  tools: []
  scripts: []

# ============================================
# CONFIG
# ============================================
config:
  extends: extend
  coding-standards: config/coding-standards.md
  tech-stack: config/tech-stack.md
  atomic-design-guide: config/atomic-design-guide.md

# ============================================
# DEPENDENCIES
# ============================================
dependencies:
  node: []
  python: []
  squads:
    - branding  # Receives design tokens and brand profile
  integrations:
    - style-dictionary
    - figma
    - tokens-studio

# ============================================
# INTEGRATION WITH BRANDING SQUAD
# ============================================
branding_integration:
  receives_from_branding:
    - design_tokens
    - palette
    - typography
    - brand_profile

  provides_to_branding:
    - component_library
    - theme_css
    - storybook_docs

tags:
  - design-system
  - components
  - atomic-design
  - tokens
  - accessibility
  - documentation
